<svg width="800" height="580" viewBox="0 0 800 580" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">

  <!-- Background -->
  <rect width="800" height="580" fill="#0D1117" rx="12"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#E8ECFF" font-size="16" font-weight="600">Distributed API Gateway — Architecture</text>

  <!-- CLIENT -->
  <rect x="300" y="55" width="200" height="44" rx="8" fill="#1C2333" stroke="#3B4A6B" stroke-width="1"/>
  <text x="400" y="82" text-anchor="middle" fill="#7A85A8" font-size="12">Client / Browser / Mobile App</text>

  <!-- Arrow Client → Gateway -->
  <line x1="400" y1="99" x2="400" y2="128" stroke="#3B4A6B" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="420" y="118" fill="#4A5270" font-size="10">HTTPS</text>

  <!-- API GATEWAY BIG BOX -->
  <rect x="40" y="130" width="720" height="160" rx="10" fill="#111827" stroke="#185FA5" stroke-width="1.5"/>
  <text x="400" y="152" text-anchor="middle" fill="#61AFEF" font-size="13" font-weight="600">API Gateway · Spring Cloud Gateway · Port 8080</text>

  <!-- JWT Filter box -->
  <rect x="65" y="162" width="170" height="52" rx="6" fill="#1A1F35" stroke="#534AB7" stroke-width="1"/>
  <text x="150" y="183" text-anchor="middle" fill="#A78BFA" font-size="12" font-weight="600">JWT Auth Filter</text>
  <text x="150" y="200" text-anchor="middle" fill="#7A6FC0" font-size="10">Validates Bearer token</text>

  <!-- Rate Limiter box -->
  <rect x="315" y="162" width="170" height="52" rx="6" fill="#1A1F35" stroke="#854F0B" stroke-width="1"/>
  <text x="400" y="183" text-anchor="middle" fill="#FBBF24" font-size="12" font-weight="600">Rate Limiter</text>
  <text x="400" y="200" text-anchor="middle" fill="#92620A" font-size="10">Redis · 10 req/sec per user</text>

  <!-- Circuit Breaker box -->
  <rect x="565" y="162" width="170" height="52" rx="6" fill="#1A1F35" stroke="#993C1D" stroke-width="1"/>
  <text x="650" y="183" text-anchor="middle" fill="#F87171" font-size="12" font-weight="600">Circuit Breaker</text>
  <text x="650" y="200" text-anchor="middle" fill="#7A2F1A" font-size="10">Resilience4j · Fallback</text>

  <!-- Flow arrows inside gateway -->
  <line x1="235" y1="188" x2="313" y2="188" stroke="#3B4A6B" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="485" y1="188" x2="563" y2="188" stroke="#3B4A6B" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Router text -->
  <text x="400" y="255" text-anchor="middle" fill="#4A5270" font-size="11">Smart router — routes by URL path to downstream services</text>
  <text x="400" y="272" text-anchor="middle" fill="#4A5270" font-size="10">Logging filter adds X-Correlation-Id · X-User-Id · X-Username headers</text>

  <!-- Arrows: Gateway → Services -->
  <line x1="170" y1="290" x2="140" y2="335" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="370" y1="290" x2="370" y2="335" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="600" y1="290" x2="600" y2="335" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Route labels -->
  <text x="100" y="320" text-anchor="middle" fill="#4A5270" font-size="10">/api/auth/**</text>
  <text x="370" y="320" text-anchor="middle" fill="#4A5270" font-size="10">/api/orders/**</text>
  <text x="600" y="320" text-anchor="middle" fill="#4A5270" font-size="10">/api/products/**</text>

  <!-- AUTH SERVICE -->
  <rect x="50" y="335" width="185" height="60" rx="8" fill="#0F2A22" stroke="#0F6E56" stroke-width="1"/>
  <text x="142" y="358" text-anchor="middle" fill="#34D399" font-size="13" font-weight="600">Auth Service</text>
  <text x="142" y="376" text-anchor="middle" fill="#065F46" font-size="10">JWT · BCrypt · H2 DB</text>
  <text x="142" y="390" text-anchor="middle" fill="#065F46" font-size="10">Port 8083</text>

  <!-- ORDER SERVICE -->
  <rect x="280" y="335" width="185" height="60" rx="8" fill="#0F2A22" stroke="#0F6E56" stroke-width="1"/>
  <text x="372" y="358" text-anchor="middle" fill="#34D399" font-size="13" font-weight="600">Order Service</text>
  <text x="372" y="376" text-anchor="middle" fill="#065F46" font-size="10">CRUD operations</text>
  <text x="372" y="390" text-anchor="middle" fill="#065F46" font-size="10">Port 8081</text>

  <!-- PRODUCT SERVICE -->
  <rect x="510" y="335" width="240" height="60" rx="8" fill="#0F2A22" stroke="#0F6E56" stroke-width="1"/>
  <text x="630" y="358" text-anchor="middle" fill="#34D399" font-size="13" font-weight="600">Product Service</text>
  <text x="630" y="376" text-anchor="middle" fill="#065F46" font-size="10">Product catalog</text>
  <text x="630" y="390" text-anchor="middle" fill="#065F46" font-size="10">Port 8082</text>

  <!-- Infra section divider -->
  <line x1="40" y1="420" x2="760" y2="420" stroke="#1C2333" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="400" y="440" text-anchor="middle" fill="#3B4A6B" font-size="11">Infrastructure</text>

  <!-- REDIS -->
  <rect x="80" y="455" width="240" height="60" rx="8" fill="#0A2015" stroke="#3B6D11" stroke-width="1"/>
  <text x="200" y="478" text-anchor="middle" fill="#86EFAC" font-size="13" font-weight="600">Redis</text>
  <text x="200" y="496" text-anchor="middle" fill="#14532D" font-size="10">Rate limit counters · Token bucket</text>
  <text x="200" y="510" text-anchor="middle" fill="#14532D" font-size="10">Port 6379</text>

  <!-- ZIPKIN -->
  <rect x="480" y="455" width="240" height="60" rx="8" fill="#28101E" stroke="#993556" stroke-width="1"/>
  <text x="600" y="478" text-anchor="middle" fill="#F9A8D4" font-size="13" font-weight="600">Zipkin</text>
  <text x="600" y="496" text-anchor="middle" fill="#831843" font-size="10">Distributed tracing · Micrometer</text>
  <text x="600" y="510" text-anchor="middle" fill="#831843" font-size="10">Port 9411</text>

  <!-- Dashed links to infra -->
  <line x1="310" y1="215" x2="200" y2="455" stroke="#1C2333" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="490" y1="215" x2="600" y2="455" stroke="#1C2333" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Docker label bottom -->
  <text x="400" y="552" text-anchor="middle" fill="#3B4A6B" font-size="10">Docker Compose · Kubernetes · GitHub Actions CI/CD</text>

  <!-- Arrow marker def -->
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

</svg>
