name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test All Services
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build & Test gateway-service
        working-directory: ./gateway-service
        run: mvn clean compile -B

      - name: Build & Test auth-service
        working-directory: ./auth-service
        run: mvn clean compile -B

      - name: Build & Test order-service
        working-directory: ./order-service
        run: mvn clean compile -B

      - name: Build & Test product-service
        working-directory: ./product-service
        run: mvn clean compile -B

      - name: Package all services
        run: |
          cd gateway-service && mvn package -DskipTests -B && cd ..
          cd auth-service && mvn package -DskipTests -B && cd ..
          cd order-service && mvn package -DskipTests -B && cd ..
          cd product-service && mvn package -DskipTests -B && cd ..